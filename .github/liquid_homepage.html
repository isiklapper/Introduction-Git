<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ collection.title }}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Space+Mono:400,700">
  <style>
    body { font-family: "Open Sans", sans-serif; background: #f4f6f9; color: #333; margin: 0; padding: 0; }
    .header { background: #004B87; color: white; padding: 60px 20px; text-align: center; }
    .header h1 { margin: 0; font-size: 2.5em; font-weight: 300; }
    .header p { margin: 15px 0 0 0; font-size: 1.1em; opacity: 0.8; }
    .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
    .card { background: white; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 30px; border-top: 4px solid #004B87; transition: transform 0.2s; text-decoration: none; color: inherit; display: block; }
    .card:hover { transform: translateY(-5px); }
    .card h2 { margin: 0 0 15px 0; font-size: 1.4em; color: #004B87; }
    .card p { margin: 0; line-height: 1.6; color: #666; }
  </style>
</head>
<body>

  <div class="header">
    <h1>{{ collection.title }}</h1>
    <p>{{ collection.description }}</p>
  </div>

  <div class="container">
    <div class="grid">
      {% for doc in manifest.docref %}
      <a class="card" href="{{ doc.identifier | downcase | replace: ' ', '-' }}/index.html">
        <h2>{{ doc.identifier }}</h2>
        <p>{{ doc.title }}</p>
      </a>
      {% endfor %}
    </div>
  </div>

</body>
</html>
