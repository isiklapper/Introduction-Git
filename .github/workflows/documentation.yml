name: Metanorma Auto Publish

on:
  push:
    branches: [ main, master ] # main 또는 master 브랜치에 푸시될 때 실행

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 메타노마 공식 도커 이미지를 사용하여 안전하고 빠르게 컴파일합니다.
      - name: Compile Metanorma Document
        run: |
          docker run --rm -v ${{ github.workspace }}:/metanorma -w /metanorma metanorma/metanorma metanorma compile --agree-to-terms s99-document.adoc

      # 빌드된 결과물을 웹사이트 메인(index.html)으로 서빙하기 위해 이름을 변경하여 복사합니다.
      - name: Prepare Deployment Artifacts
        run: |
          mkdir public
          cp s99-document.html public/index.html || true

      # public 폴더의 내용을 gh-pages 브랜치로 안전하게 보냅니다.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public