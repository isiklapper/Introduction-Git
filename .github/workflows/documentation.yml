name: Metanorma Auto Publish

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # [진단 단계] 로봇의 눈에 내 파일들이 진짜 어떤 이름과 구조로 보이는지 로그에 찍어줍니다.
      - name: Check Directory and File Names
        run: |
          echo "=== 현재 폴더 위치의 파일 목록 ==="
          ls -la
          echo "=== 전체 폴더 구조 들여다보기 ==="
          find . -maxdepth 3 -not -path '*/.*'

      - name: Compile Metanorma Document
        run: |
          docker run --rm -v ${{ github.workspace }}:/metanorma -w /metanorma metanorma/metanorma compile --agree-to-terms s99-document.adoc

      - name: Prepare Deployment Artifacts
        run: |
          mkdir public
          cp s99-document.html public/index.html || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public