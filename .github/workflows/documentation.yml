name: Metanorma Auto Publish

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # collection.yml 대신 우리가 만든 s99-document.adoc를 직접 컴파일하도록 강제합니다.
      - name: Compile Metanorma Document
        run: |
          docker run --rm -v ${{ github.workspace }}:/metanorma -w /metanorma metanorma/metanorma metanorma compile --agree-to-terms s99-document.adoc

      # 빌드 완료 후 생성된 HTML 파일을 public 폴더로 이동
      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p public
          cp INTRODUCTION-GIT/s99-document.adoc public/index.html || true

      # public 폴더의 내용을 gh-pages 브랜치로 배포
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public