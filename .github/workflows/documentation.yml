name: Metanorma Auto Publish

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. 메타노마 컴파일 실행
      - name: Compile Metanorma Document
        run: |
          docker run --rm -v ${{ github.workspace }}:/metanorma -w /metanorma metanorma/metanorma metanorma compile --agree-to-terms Introduction-Git/s99-document.adoc

      # 2. 어디에 생성되었든 .html 파일을 자동으로 찾아내서 public/index.html로 복사합니다.
      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p public
          touch public/.nojekyll
          
          echo "=== 프로젝트 전체에서 HTML 파일 검색 중 ==="
          # public 폴더를 제외하고 가장 먼저 발견되는 .html 파일의 경로를 획득합니다.
          HTML_PATH=$(find . -name "*.html" -not -path "./public/*" | head -n 1)
          
          if [ -n "$HTML_PATH" ]; then
            echo "🎯 발견된 HTML 파일: $HTML_PATH"
            cp "$HTML_PATH" public/index.html
            echo "✅ index.html로 변환 및 복사 성공!"
          else
            echo "❌ 에러: 컴파일된 HTML 파일을 찾을 수 없습니다."
            exit 1
          fi

      # 3. 배포 진행
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public